<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>API测试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
        input { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <h1>八字分析API测试</h1>
    
    <h2>测试1: 直接测试后端API</h2>
    <p>这会直接向Render后端发送请求，绕过前端部署问题</p>
    <button onclick="testAPI()">测试API</button>
    <div id="result"></div>

    <h2>测试2: 检查当前网站版本</h2>
    <p>打开浏览器控制台(F12)查看是否有新版本</p>
    <button onclick="checkVersion()">检查版本</button>
    <div id="version"></div>

    <script>
        const API_URL = 'https://bazi-talent-api.onrender.com';
        
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在请求API...</p>';
            
            try {
                const response = await fetch(`${API_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: "测试",
                        year: 1998,
                        month: 6,
                        day: 14,
                        hour: 16,
                        minute: 0,
                        gender: "male",
                        province: "北京市",
                        city: "北京市"
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <p class="success">✅ API调用成功！</p>
                        <h3>关键数据检查：</h3>
                        <ul>
                            <li>日主: ${data.data.bazi.day_master}</li>
                            <li>身强身弱: ${data.data.analysis.strength}</li>
                            <li>主要格局: ${data.data.analysis.main_pattern}</li>
                            <li>raw_data包含论级数据: ${data.data.raw_data && Object.keys(data.data.raw_data).length > 0 ? '✅ 是' : '❌ 否'}</li>
                        </ul>
                        <h3>第一论级数据:</h3>
                        <pre>${JSON.stringify(data.data.raw_data['第一论级_月令与格局'], null, 2)}</pre>
                        <h3>完整响应:</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ API返回错误: ${data.error}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ 请求失败: ${error.message}</p>`;
            }
        }
        
        function checkVersion() {
            document.getElementById('version').innerHTML = `
                <p>当前时间: ${new Date().toLocaleString()}</p>
                <p>请检查当前页面是否有以下新功能：</p>
                <ul>
                    <li>是否有"快速输入"文本框</li>
                    <li>日期和时间是否在同一行</li>
                    <li>是否有"时辰未知"按钮</li>
                </ul>
                <p>如果没有，说明前端部署未更新</p>
            `;
        }
    </script>
</body>
</html>
