services:
  - type: web
    name: bazi-talent-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        # 请在 Render Dashboard → Environment Variables 中设置实际值
        # 本地开发请复制 backend/.env.example 为 backend/.env 并填入 key
        value: placeholder_replace_in_dashboard
