<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字天赋分析 - 调试版</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #F0F9FF 0%, #FDFCF8 50%, #F0FFF4 100%);
      min-height: 100vh;
      color: #4A5568;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 20px 0;
    }

    .header h1 {
      font-size: 22px;
      color: #4A5568;
      margin-bottom: 8px;
    }

    .header .badge {
      display: inline-block;
      padding: 4px 12px;
      background: #FC8181;
      color: white;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .form-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(142, 197, 252, 0.08);
      border: 1px solid rgba(142, 197, 252, 0.15);
      margin-bottom: 16px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #4A5568;
      margin-bottom: 12px;
    }

    .form-label svg {
      width: 18px;
      height: 18px;
      color: #8EC5FC;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      transition: all 0.2s;
      color: #4A5568;
    }

    input:focus {
      outline: none;
      border-color: #8EC5FC;
      box-shadow: 0 0 0 4px rgba(142, 197, 252, 0.15);
    }

    .datetime-row {
      display: flex;
      gap: 8px;
    }

    .datetime-row input {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
    }

    .datetime-row input.narrow {
      flex: 0.7;
    }

    .gender-options {
      display: flex;
      gap: 12px;
    }

    .gender-btn {
      flex: 1;
      padding: 16px;
      background: #F7FAFC;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      color: #718096;
      transition: all 0.2s;
    }

    .gender-btn.active {
      border-color: #8EC5FC;
      background: linear-gradient(135deg, #F0F9FF 0%, #F0FFF4 100%);
      color: #4A5568;
      font-weight: 600;
    }

    .location-row {
      display: flex;
      gap: 8px;
    }

    .location-row select {
      flex: 1;
      padding: 14px;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      font-size: 15px;
      color: #4A5568;
      background: white;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8EC5FC 0%, #A8E6CF 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 16px rgba(142, 197, 252, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 结果区域 */
    .result-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }

    .result-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #E2E8F0;
      padding-bottom: 12px;
    }

    .tab-btn {
      padding: 8px 16px;
      background: #F7FAFC;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #718096;
    }

    .tab-btn.active {
      background: #8EC5FC;
      color: white;
    }

    .ai-report {
      line-height: 1.8;
      color: #4A5568;
    }

    .ai-report h3 {
      color: #4A5568;
      font-size: 16px;
      margin: 20px 0 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #8EC5FC;
    }

    .ai-report h2 {
      color: #4A5568;
      font-size: 18px;
      margin: 24px 0 12px;
    }

    .ai-report strong {
      color: #4A5568;
    }

    .debug-data {
      background: #1a1a2e;
      color: #00ff00;
      padding: 16px;
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .copy-btn {
      padding: 8px 16px;
      background: #8EC5FC;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #E2E8F0;
      border-top-color: #8EC5FC;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      color: #FC8181;
      padding: 12px;
      background: #FFF5F5;
      border-radius: 8px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <div class="header">
        <h1>八字天赋分析系统</h1>
        <span class="badge">DEBUG模式</span>
      </div>

      <!-- 输入表单 -->
      <div v-if="!result && !loading">
        <div class="form-card">
          <label class="form-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            姓名
          </label>
          <input type="text" v-model="form.name" placeholder="请输入姓名">
        </div>

        <div class="form-card">
          <label class="form-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            出生日期时间
          </label>
          <div class="datetime-row">
            <input type="number" v-model.number="form.year" placeholder="年" min="1900" max="2100">
            <input type="number" v-model.number="form.month" placeholder="月" min="1" max="12">
            <input type="number" v-model.number="form.day" placeholder="日" min="1" max="31">
            <input type="number" v-model.number="form.hour" placeholder="时" min="0" max="23">
            <input type="number" v-model.number="form.minute" placeholder="分" min="0" max="59" class="narrow">
          </div>
        </div>

        <div class="form-card">
          <label class="form-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4M12 8h.01"/>
            </svg>
            性别
          </label>
          <div class="gender-options">
            <button 
              class="gender-btn" 
              :class="{ active: form.gender === 'male' }"
              @click="form.gender = 'male'"
            >
              男生
            </button>
            <button 
              class="gender-btn" 
              :class="{ active: form.gender === 'female' }"
              @click="form.gender = 'female'"
            >
              女生
            </button>
          </div>
        </div>

        <div class="form-card">
          <label class="form-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            出生地点（可选）
          </label>
          <div class="location-row">
            <select v-model="form.province" @change="form.city = ''">
              <option value="">选择省份</option>
              <option v-for="prov in provinces" :key="prov" :value="prov">{{ prov }}</option>
            </select>
            <select v-model="form.city">
              <option value="">选择城市</option>
              <option v-for="city in cities" :key="city" :value="city">{{ city }}</option>
            </select>
          </div>
        </div>

        <button class="submit-btn" @click="analyze" :disabled="!canSubmit">
          开始分析（Debug模式）
        </button>
      </div>

      <!-- 加载状态 -->
      <div v-if="loading" class="loading">
        <div class="spinner"></div>
        <p>正在分析中...</p>
      </div>

      <!-- 结果展示 -->
      <div v-if="result" class="result-section">
        <div class="result-tabs">
          <button 
            class="tab-btn" 
            :class="{ active: activeTab === 'ai' }"
            @click="activeTab = 'ai'"
          >
            AI报告
          </button>
          <button 
            class="tab-btn" 
            :class="{ active: activeTab === 'debug' }"
            @click="activeTab = 'debug'"
          >
            调试数据
          </button>
        </div>

        <!-- AI报告 -->
        <div v-if="activeTab === 'ai'" class="ai-report" v-html="renderedAIReport"></div>

        <!-- 调试数据 -->
        <div v-if="activeTab === 'debug'">
          <button class="copy-btn" @click="copyDebugData">复制完整JSON</button>
          <pre class="debug-data">{{ JSON.stringify(debugData, null, 2) }}</pre>
        </div>

        <button class="submit-btn" @click="reset" style="margin-top: 20px;">
          重新分析
        </button>
      </div>

      <div v-if="error" class="error">{{ error }}</div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    // 省市数据（简化版）
    const cityData = {
      "北京市": ["北京市"],
      "上海市": ["上海市"],
      "广东省": ["广州市", "深圳市", "珠海市", "汕头市", "佛山市", "韶关市", "湛江市", "肇庆市", "江门市", "茂名市", "惠州市", "梅州市", "汕尾市", "河源市", "阳江市", "清远市", "东莞市", "中山市", "潮州市", "揭阳市", "云浮市"],
      "浙江省": ["杭州市", "宁波市", "温州市", "嘉兴市", "湖州市", "绍兴市", "金华市", "衢州市", "舟山市", "台州市", "丽水市"],
      "江苏省": ["南京市", "无锡市", "徐州市", "常州市", "苏州市", "南通市", "连云港市", "淮安市", "盐城市", "扬州市", "镇江市", "泰州市", "宿迁市"],
      "四川省": ["成都市", "自贡市", "攀枝花市", "泸州市", "德阳市", "绵阳市", "广元市", "遂宁市", "内江市", "乐山市", "南充市", "眉山市", "宜宾市", "广安市", "达州市", "雅安市", "巴中市", "资阳市", "阿坝州", "甘孜州", "凉山州"],
      "湖北省": ["武汉市", "黄石市", "十堰市", "宜昌市", "襄阳市", "鄂州市", "荆门市", "孝感市", "荆州市", "黄冈市", "咸宁市", "随州市", "恩施州"],
      "湖南省": ["长沙市", "株洲市", "湘潭市", "衡阳市", "邵阳市", "岳阳市", "常德市", "张家界市", "益阳市", "郴州市", "永州市", "怀化市", "娄底市", "湘西州"],
      "河南省": ["郑州市", "开封市", "洛阳市", "平顶山市", "安阳市", "鹤壁市", "新乡市", "焦作市", "濮阳市", "许昌市", "漯河市", "三门峡市", "南阳市", "商丘市", "信阳市", "周口市", "驻马店市"],
      "山东省": ["济南市", "青岛市", "淄博市", "枣庄市", "东营市", "烟台市", "潍坊市", "济宁市", "泰安市", "威海市", "日照市", "莱芜市", "临沂市", "德州市", "聊城市", "滨州市", "菏泽市"],
      "河北省": ["石家庄市", "唐山市", "秦皇岛市", "邯郸市", "邢台市", "保定市", "张家口市", "承德市", "沧州市", "廊坊市", "衡水市"],
      "山西省": ["太原市", "大同市", "阳泉市", "长治市", "晋城市", "朔州市", "晋中市", "运城市", "忻州市", "临汾市", "吕梁市"],
      "辽宁省": ["沈阳市", "大连市", "鞍山市", "抚顺市", "本溪市", "丹东市", "锦州市", "营口市", "阜新市", "辽阳市", "盘锦市", "铁岭市", "朝阳市", "葫芦岛市"],
      "吉林省": ["长春市", "吉林市", "四平市", "辽源市", "通化市", "白山市", "松原市", "白城市", "延边州"],
      "黑龙江省": ["哈尔滨市", "齐齐哈尔市", "鸡西市", "鹤岗市", "双鸭山市", "大庆市", "伊春市", "佳木斯市", "七台河市", "牡丹江市", "黑河市", "绥化市", "大兴安岭地区"],
      "安徽省": ["合肥市", "芜湖市", "蚌埠市", "淮南市", "马鞍山市", "淮北市", "铜陵市", "安庆市", "黄山市", "滁州市", "阜阳市", "宿州市", "六安市", "亳州市", "池州市", "宣城市"],
      "福建省": ["福州市", "厦门市", "莆田市", "三明市", "泉州市", "漳州市", "南平市", "龙岩市", "宁德市"],
      "江西省": ["南昌市", "景德镇市", "萍乡市", "九江市", "新余市", "鹰潭市", "赣州市", "吉安市", "宜春市", "抚州市", "上饶市"],
      "海南省": ["海口市", "三亚市", "三沙市", "儋州市"],
      "贵州省": ["贵阳市", "六盘水市", "遵义市", "安顺市", "毕节市", "铜仁市", "黔西南州", "黔东南州", "黔南州"],
      "云南省": ["昆明市", "曲靖市", "玉溪市", "保山市", "昭通市", "丽江市", "普洱市", "临沧市", "楚雄州", "红河州", "文山州", "西双版纳州", "大理州", "德宏州", "怒江州", "迪庆州"],
      "陕西省": ["西安市", "铜川市", "宝鸡市", "咸阳市", "渭南市", "延安市", "汉中市", "榆林市", "安康市", "商洛市"],
      "甘肃省": ["兰州市", "嘉峪关市", "金昌市", "白银市", "天水市", "武威市", "张掖市", "平凉市", "酒泉市", "庆阳市", "定西市", "陇南市", "临夏州", "甘南州"],
      "青海省": ["西宁市", "海东市", "海北州", "黄南州", "海南州", "果洛州", "玉树州", "海西州"],
      "台湾省": ["台北市", "高雄市", "基隆市", "台中市", "台南市", "新竹市", "嘉义市"],
      "内蒙古自治区": ["呼和浩特市", "包头市", "乌海市", "赤峰市", "通辽市", "鄂尔多斯市", "呼伦贝尔市", "巴彦淖尔市", "乌兰察布市", "兴安盟", "锡林郭勒盟", "阿拉善盟"],
      "广西壮族自治区": ["南宁市", "柳州市", "桂林市", "梧州市", "北海市", "防城港市", "钦州市", "贵港市", "玉林市", "百色市", "贺州市", "河池市", "来宾市", "崇左市"],
      "西藏自治区": ["拉萨市", "日喀则市", "昌都市", "林芝市", "山南市", "那曲市", "阿里地区"],
      "宁夏回族自治区": ["银川市", "石嘴山市", "吴忠市", "固原市", "中卫市"],
      "新疆维吾尔自治区": ["乌鲁木齐市", "克拉玛依市", "吐鲁番市", "哈密市", "昌吉州", "博尔塔拉州", "巴音郭楞州", "阿克苏地区", "克孜勒苏州", "喀什地区", "和田地区", "伊犁州", "塔城地区", "阿勒泰地区"],
      "香港特别行政区": ["香港"],
      "澳门特别行政区": ["澳门"]
    };

    const API_BASE_URL = 'https://bazi-talent-api.onrender.com';

    createApp({
      setup() {
        const form = ref({
          name: '',
          year: 2000,
          month: 1,
          day: 1,
          hour: 12,
          minute: 0,
          gender: 'male',
          province: '',
          city: ''
        });

        const loading = ref(false);
        const result = ref(null);
        const error = ref('');
        const activeTab = ref('ai');
        const debugData = ref({});

        const provinces = computed(() => Object.keys(cityData));
        
        const cities = computed(() => {
          if (!form.value.province) return [];
          return cityData[form.value.province] || [];
        });

        const canSubmit = computed(() => {
          return form.value.name.trim() && form.value.gender;
        });

        const renderedAIReport = computed(() => {
          if (!result.value?.ai_report) return '';
          return result.value.ai_report
            .replace(/### (.*)/g, '<h3>$1</h3>')
            .replace(/## (.*)/g, '<h2>$1</h2>')
            .replace(/# (.*)/g, '<h1>$1</h1>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        });

        const analyze = async () => {
          loading.value = true;
          error.value = '';

          try {
            const response = await fetch(`${API_BASE_URL}/api/analyze`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Debug-Mode': 'true'
              },
              body: JSON.stringify({
                name: form.value.name,
                year: form.value.year,
                month: form.value.month,
                day: form.value.day,
                hour: form.value.hour,
                minute: form.value.minute,
                gender: form.value.gender,
                province: form.value.province,
                city: form.value.city
              })
            });

            const data = await response.json();

            if (data.success) {
              result.value = data.data;
              debugData.value = data.data._debug_full_data || data.data;
              
              // 自动获取AI分析
              if (!data.data.ai_report) {
                await getAIReport(data.data.report_id, data.data);
              }
            } else {
              error.value = data.error || '分析失败';
            }
          } catch (err) {
            error.value = '网络错误: ' + err.message;
          } finally {
            loading.value = false;
          }
        };

        const getAIReport = async (reportId, basicResult) => {
          try {
            const response = await fetch(`${API_BASE_URL}/api/analyze-ai`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Debug-Mode': 'true'
              },
              body: JSON.stringify({
                report_id: reportId,
                basic_result: basicResult
              })
            });

            const data = await response.json();
            if (data.success) {
              result.value.ai_report = data.ai_report;
            }
          } catch (err) {
            console.error('AI分析失败:', err);
          }
        };

        const copyDebugData = () => {
          navigator.clipboard.writeText(JSON.stringify(debugData.value, null, 2));
          alert('已复制到剪贴板');
        };

        const reset = () => {
          result.value = null;
          debugData.value = {};
          activeTab.value = 'ai';
        };

        return {
          form,
          loading,
          result,
          error,
          provinces,
          cities,
          canSubmit,
          activeTab,
          debugData,
          renderedAIReport,
          analyze,
          copyDebugData,
          reset
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
